<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="MHPSS - Bangladesh Red Crescent Society">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="MHPSS BDRCS">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>MHPSS BDRCS - Bangladesh Red Crescent Society</title>
  <link rel="manifest" href="manifest.json">


  <style>
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #F8FAFC;
      transition: opacity 0.4s ease;
    }
    @media (prefers-color-scheme: dark) {
      #splash { background: #0F172A; }
      #splash p { color: #94A3B8; }
      .loading-bar { background: #334155; }
      .loading-bar::after { background: #6366F1; }
    }
    #splash.hide {
      opacity: 0;
      pointer-events: none;
    }
    #splash img {
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
      border-radius: 20px;
    }
    .loading-bar {
      width: 72px;
      height: 4px;
      background: #e0e0e0;
      border-radius: 2px;
      overflow: hidden;
    }
    .loading-bar::after {
      content: '';
      display: block;
      width: 100%;
      height: 100%;
      background: #4a90d9;
      border-radius: 2px;
      animation: scan 1.2s ease-in-out infinite;
    }
    @keyframes scan {
      0%   { width: 0%; }
      50%  { width: 100%; }
      100% { width: 0%; }
    }
    #splash p {
      margin-top: 16px;
      font: 14px/1.4 -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #666;
    }
  </style>
</head>
<body>
   <div id="splash">
    <img src="icons/Icon-192.png" alt="MH Assistant">
    <div class="loading-bar"></div>
  </div>

  <script>
    var splashEl = document.getElementById('splash');
    function hideSplash() {
      if (splashEl) splashEl.classList.add('hide');
    }
    window.addEventListener('flutter-first-frame', hideSplash);
    setTimeout(hideSplash, 8000);
  </script>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
